# nginx config for the single-container demo image.
# Container Apps terminates TLS upstream; this server only speaks HTTP on :80.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/nee/web;
    index index.html;

    client_max_body_size 30m;

    # Dev endpoint — accept only loopback (the entrypoint calls it once at boot).
    location = /api/dev/reseed-passwords {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:5000;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SignalR / WebSocket upgrade
    location /hubs/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
